<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقة اعتكاف ذكية</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <button class="header-icon" aria-label="رجوع">✕</button>
    <h1 class="header-title">  إنشاء بطاقة اعتكاف ذكية</h1>
    <div class="header-spacer"></div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Input Form -->
    <section class="form-section">
      <div class="form-group">
        <label for="nameInput">اسم المُعتكِف</label>
        <input type="text" id="nameInput" placeholder="مثال: عبدالله محمد" />
      </div>
      <div class="form-group">
        <label for="supervisorInput">اسم المسؤول</label>
        <select id="supervisorInput">
          <option value="">-- اختر المسؤول --</option>
          <option value="مازن">مازن</option>
          <option value="أحمد موسى">أحمد موسى</option>
          <option value="محمد حسني">محمد حسني</option>
          <option value="عبدالرحمن تاج">عبدالرحمن تاج</option>
          <option value="محمد زكريا">محمد زكريا</option>
          <option value="ش. أحمد فتحي">ش. أحمد فتحي</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="roomInput">الغرفة</label>
          <select id="roomInput">
            <option value="">-- اختر الغرفة --</option>
            <option value="قاعة 1">قاعة 1</option>
            <option value="قاعة 2">قاعة 2</option>
            <option value="قاعة 3">قاعة 3</option>
          </select>
        </div>
        <div class="form-group">
  <label for="floorInput">الدور</label>
  <select id="floorInput">
    <option value="الدور الأول">الدور الأول</option>
    <option value="الدور الثاني">الدور الثاني</option>
    <option value="الدور الثالث">الدور الثالث</option>
    <option value="الدور الرابع" selected>الدور الرابع</option>
  </select>
</div>
      </div>
      <div class="form-actions">
        <button id="generateBtn" class="btn btn-primary">إنشاء البطاقة</button>
        <button id="downloadBtn" class="btn btn-secondary" disabled>تحميل البطاقة كصورة</button>
      </div>
    </section>

    <!-- Saved Cards List -->
    <section id="savedCardsSection" class="saved-cards-section" style="display:none;">
      <h2 class="saved-cards-title">البطاقات المحفوظة</h2>
      <div id="savedCardsList" class="saved-cards-list"></div>
    </section>

    <!-- Card Preview -->
    <section id="cardPreview" class="card-preview-section" style="display:none;">
      <div id="smartCard" class="smart-card">
        <!-- Decorative border -->
        <div class="card-ornament-top"></div>

        <h2 class="card-title">بطاقة معتكف ذكية</h2>

        <!-- QR Code -->
        <div class="qr-container">
          <div id="qrCode" class="qr-code"></div>
        </div>

        <!-- Name -->
        <div class="card-field">
          <span class="card-label">اسم المُعتكِف</span>
          <span id="cardName" class="card-value">محمد منسي</span>
        </div>

        <!-- Room & Floor -->
        <div class="card-info-row">
          <div class="card-info-block">
            <span class="card-label">الغرفة</span>
            <span id="cardRoom" class="card-value">قاعة 2</span>
          </div>
          <div class="card-info-block">
            <span class="card-label">الدور</span>
            <span id="cardFloor" class="card-value">الرابع</span>
          </div>
        </div>

        <!-- Supervisor -->
        <div class="card-field">
          <span class="card-label">اسم المسؤول</span>
          <span id="cardSupervisor" class="card-value">أحمد عبدالله</span>
        </div>

        <div class="card-ornament-bottom"></div>
      </div>
    </section>
  </main>

  <!-- Libraries -->
  <script src="vendor/qrcode.min.js"></script>
  <script src="vendor/html2canvas.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
